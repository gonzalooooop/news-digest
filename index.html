  ];

  const SECTION_DEFS = [
    { key: 'carNews', label: '업계 소식', rail: 'car' },
    { key: 'communityPosts', label: '커뮤니티 인기글', rail: 'community' },
    { key: 'heydealer', label: "'헤이딜러' 언급", rail: 'heydealer' },
  ];

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  function renderItems(key, list) {
    if (!list || list.length === 0) {
      return '<p class="empty-note">특이 소식 없음</p>';
    }
    return '<ul class="items">' + list.map((item) => {
      const meta = [item.community, item.stat, item.note].filter(Boolean).map(escapeHtml).join(' · ');
      return `<li>
        <a href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>
        ${meta ? `<span class="item-meta">${meta}</span>` : ''}
      </li>`;
    }).join('') + '</ul>';
  }

  function renderEntry(entry) {
    const EDITION_LABELS = { morning: '☀️ 조간', midday: '🌤️ 주간', evening: '🌙 석간' };
    const editionLabel = EDITION_LABELS[entry.edition] || entry.edition;
    return `
      <article class="entry">
        <div class="entry-header">
          <div class="entry-edition">
            <span class="edition-dot"></span>
            <span class="label">${escapeHtml(editionLabel)}</span>
            <span class="range">${escapeHtml(entry.rangeLabel || '')}</span>
          </div>
          <span class="entry-date">${escapeHtml(entry.date)} ${escapeHtml(entry.generatedAt || '')}</span>
        </div>
        ${entry.headline ? `<div class="headline">${escapeHtml(entry.headline)}</div>` : ''}
        ${SECTION_DEFS.map((def) => `
          <div class="section section-${def.rail}">
            <div class="section-label"><span class="rail ${def.rail}"></span>${def.label}</div>
            ${renderItems(def.key, entry[def.key])}
          </div>
        `).join('')}
      </article>
    `;
  }

  const feedEl = document.getElementById('feed');
  let selectedDate = null;

  function renderFeed() {
    const list = selectedDate ? ENTRIES.filter((e) => e.date === selectedDate) : ENTRIES;
    const filterBar = document.getElementById('filterBar');
    const filterLabel = document.getElementById('filterLabel');

    if (selectedDate) {
      filterBar.style.display = 'flex';
      filterLabel.textContent = `${selectedDate} 브리핑만 보는 중`;
    } else {
      filterBar.style.display = 'none';
    }

    if (ENTRIES.length === 0) {
      feedEl.innerHTML = `
        <div class="empty-state">
          <strong>아직 첫 브리핑이 도착하지 않았습니다</strong>
          <span>매일 오전 9시와 오후 8시에 자동으로 이 페이지가 업데이트됩니다.</span>
        </div>
      `;
    } else if (list.length === 0) {
      feedEl.innerHTML = `
        <div class="empty-state">
          <strong>${escapeHtml(selectedDate)}에는 브리핑이 없습니다</strong>
        </div>
      `;
    } else {
      feedEl.innerHTML = list.map(renderEntry).join('');
    }
  }

  const lastUpdatedEl = document.getElementById('lastUpdated');
  if (ENTRIES.length > 0) {
    lastUpdatedEl.textContent = `최근 업데이트 · ${ENTRIES[0].date} ${ENTRIES[0].generatedAt || ''}`;
  }

  // 캘린더: 날짜를 눌러 그 날의 아침판/저녁판만 다시 볼 수 있게 한다.
  const DOW = ['일', '월', '화', '수', '목', '금', '토'];
  const entriesByDate = {};
  ENTRIES.forEach((e) => {
    if (!entriesByDate[e.date]) entriesByDate[e.date] = {};
    entriesByDate[e.date][e.edition] = true;
  });

  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateKey(y, m, d) { return `${y}-${pad2(m + 1)}-${pad2(d)}`; }

  let calYear, calMonthIdx;
  if (ENTRIES.length > 0) {
    const [y, m] = ENTRIES[0].date.split('-').map(Number);
    calYear = y;
    calMonthIdx = m - 1;
  } else {
    const now = new Date();
    calYear = now.getFullYear();
    calMonthIdx = now.getMonth();
  }

  function formatDateWithWeekday(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dow = new Date(y, m - 1, d).getDay();
    return `${y}년 ${m}월 ${d}일(${DOW[dow]})`;
  }

  function syncCalendarSummary() {
    const el = document.getElementById('calendarSummaryText');
    if (selectedDate) {
      el.textContent = `${formatDateWithWeekday(selectedDate)} 브리핑 보는 중`;
    } else if (ENTRIES.length > 0) {
      el.textContent = formatDateWithWeekday(ENTRIES[0].date);
    } else {
      el.textContent = `${calYear}년 ${calMonthIdx + 1}월`;
    }
  }

  function renderCalendar() {
    syncCalendarSummary();
    document.getElementById('calendarTitle').textContent = `${calYear}년 ${calMonthIdx + 1}월`;
    const grid = document.getElementById('calendarGrid');
    const firstDow = new Date(calYear, calMonthIdx, 1).getDay();
    const daysInMonth = new Date(calYear, calMonthIdx + 1, 0).getDate();

    let html = DOW.map((d) => `<div class="calendar-dow">${d}</div>`).join('');
    for (let i = 0; i < firstDow; i++) {
      html += '<div class="calendar-day empty"></div>';
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const key = dateKey(calYear, calMonthIdx, day);
      const info = entriesByDate[key];
      const hasEntry = !!info;
      const isSelected = key === selectedDate;
      const dots = hasEntry
        ? `<span class="calendar-dots">${info.morning ? '☀️' : ''}${info.midday ? '🌤️' : ''}${info.evening ? '🌙' : ''}</span>`
        : '';
      const classes = ['calendar-day', hasEntry ? 'has-entry' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
      html += `<div class="${classes}" data-date="${hasEntry ? key : ''}">${day}${dots}</div>`;
    }
    grid.innerHTML = html;

    grid.querySelectorAll('.calendar-day.has-entry').forEach((el) => {
      el.addEventListener('click', () => {
        const date = el.getAttribute('data-date');
        selectedDate = selectedDate === date ? null : date;
        renderCalendar();
        renderFeed();
      });
    });
  }

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonthIdx -= 1;
    if (calMonthIdx < 0) { calMonthIdx = 11; calYear -= 1; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonthIdx += 1;
    if (calMonthIdx > 11) { calMonthIdx = 0; calYear += 1; }
    renderCalendar();
  });
  document.getElementById('calReset').addEventListener('click', () => {
    selectedDate = null;
    renderCalendar();
    renderFeed();
  });

  const calToggle = document.getElementById('calToggle');
  const calendarBody = document.getElementById('calendarBody');
  let calendarExpanded = false;
  calToggle.addEventListener('click', () => {
    calendarExpanded = !calendarExpanded;
    calendarBody.style.display = calendarExpanded ? 'block' : 'none';
    calToggle.textContent = calendarExpanded ? '접기' : '펼치기';
  });

  renderCalendar();
  renderFeed();
</script>
